    <text class="small" x="20" y="68">Balanced bright dark</text>
    <rect x="20" y="92" width="280" height="52" rx="10" fill="#182823"/><text class="label" x="30" y="123">Background</text><text class="hex" x="190" y="123">#182823</text>
    <rect x="20" y="156" width="280" height="52" rx="10" fill="#24362F"/><text class="label" x="30" y="187">Surface</text><text class="hex" x="190" y="187">#24362F</text>
    <rect x="20" y="220" width="280" height="52" rx="10" fill="#D4AF37"/><text x="30" y="251" style="fill:#1a2320;font-family:Arial,sans-serif;font-size:16px;font-weight:700;">Point Gold</text><text x="190" y="251" style="fill:#1a2320;font-family:Consolas,monospace;font-size:15px;font-weight:700;">#D4AF37</text>
    <rect x="20" y="284" width="280" height="52" rx="10" fill="#2f463d"/><text class="label" x="30" y="315">Text Sub</text><text class="hex" x="190" y="315">#C2CEC7</text>
