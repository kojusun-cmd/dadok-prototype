<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #0f1412; }
      .title { fill: #f4f7f5; font-family: Arial, sans-serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #b6c2bc; font-family: Arial, sans-serif; font-size: 20px; }
      .cardTitle { fill: #f4f7f5; font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .label { fill: #dce4e0; font-family: Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .hex { fill: #d4af37; font-family: Consolas, monospace; font-size: 15px; font-weight: 700; }
      .small { fill: #9fb0a8; font-family: Arial, sans-serif; font-size: 14px; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
